<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap"
    rel="stylesheet" />

<!-- External Libraries -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Site Styles (Scoped to prevent GHL conflicts) -->
<style>
    :root {
        --brand-primary: #1a3a2a;
        --brand-accent: #2e8b57;
        --brand-bg: #f5faf7;
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-serif: "Playfair Display", serif
    }

    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

    body {
        background: var(--brand-bg);
        color: var(--brand-primary);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        font-family: var(--font-serif);
        letter-spacing: -0.02em
    }

    a {
        text-decoration: none;
        color: inherit
    }

    img {
        display: block;
        max-width: 100%
    }

    button {
        border: none;
        background: none;
        cursor: pointer;
        font: inherit;
        color: inherit
    }

    input,
    select,
    textarea {
        font: inherit;
        color: inherit
    }

    .skip-link {
        position: absolute;
        top: -100%;
        left: 16px;
        z-index: 100;
        padding: 12px 24px;
        background: var(--brand-primary);
        color: #fff;
        font-weight: 700;
        font-size: .75rem;
        letter-spacing: .1em;
        text-transform: uppercase;
        border-radius: 0 0 12px 12px;
        transition: top .2s
    }

    .skip-link:focus {
        top: 0
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
        outline: 2px solid var(--brand-accent);
        outline-offset: 2px;
        border-radius: 4px
    }

    @media(prefers-reduced-motion:reduce) {

        *,
        *::before,
        *::after {
            animation-duration: .01ms !important;
            transition-duration: .01ms !important
        }
    }

    ::selection {
        background: var(--brand-accent);
        color: #fff
    }

    /* Layout */
    .max-w {
        max-width: 80rem;
        margin: 0 auto;
        padding: 0 1.5rem
    }

    .max-w-4xl {
        max-width: 56rem;
        margin: 0 auto;
        padding: 0 1.5rem
    }

    .max-w-3xl {
        max-width: 48rem
    }

    .grid-2 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem
    }

    .grid-3 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem
    }

    .grid-4 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem
    }

    .grid-2x2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem
    }

    @media(min-width:768px) {
        .grid-2 {
            grid-template-columns: repeat(2, 1fr)
        }

        .grid-3 {
            grid-template-columns: repeat(2, 1fr)
        }

        .grid-4 {
            grid-template-columns: repeat(2, 1fr)
        }

        .grid-2x2 {
            grid-template-columns: repeat(4, 1fr)
        }
    }

    @media(min-width:1024px) {
        .grid-3 {
            grid-template-columns: repeat(3, 1fr)
        }

        .grid-4 {
            grid-template-columns: repeat(4, 1fr)
        }
    }

    /* Animations */
    .fade-up {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity .8s cubic-bezier(.21, .47, .32, .98), transform .8s cubic-bezier(.21, .47, .32, .98)
    }

    .fade-up.visible {
        opacity: 1;
        transform: translateY(0)
    }

    .hero-content {
        opacity: 0;
        transform: translateY(60px);
        animation: heroIn 1.2s cubic-bezier(.16, 1, .3, 1) .2s forwards
    }

    @keyframes heroIn {
        to {
            opacity: 1;
            transform: translateY(0)
        }
    }

    .hero-rating {
        opacity: 0;
        transform: translateX(-20px);
        animation: ratingIn .8s ease .5s forwards
    }

    @keyframes ratingIn {
        to {
            opacity: 1;
            transform: translateX(0)
        }
    }

    @keyframes bounce {

        0%,
        100% {
            transform: translateX(-50%) translateY(0)
        }

        50% {
            transform: translateX(-50%) translateY(10px)
        }
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0)
        }

        50% {
            transform: translateY(-6px)
        }
    }

    .btn-hover {
        transition: transform .2s
    }

    .btn-hover:hover {
        transform: scale(1.05)
    }

    .btn-hover:active {
        transform: scale(.95)
    }

    /* Navbar */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 50;
        transition: all .5s;
        padding: 2rem 0
    }

    .navbar.scrolled {
        background: rgba(252, 250, 247, .9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 1rem 0;
        box-shadow: 0 1px 3px rgba(0, 0, 0, .05)
    }

    .navbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between
    }

    .nav-logo {
        font-family: var(--font-serif);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -.05em;
        color: #fff;
        transition: color .5s
    }

    .navbar.scrolled .nav-logo {
        color: var(--brand-primary)
    }

    .nav-logo-img {
        height: 120px;
        width: auto;
        object-fit: contain;
        transition: all .5s
    }

    .navbar.scrolled .nav-logo-img {
        height: 72px
    }

    .nav-links {
        display: none;
        align-items: center;
        gap: 2.5rem
    }

    @media(min-width:768px) {
        .nav-links {
            display: flex
        }
    }

    .nav-link {
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .2em;
        color: rgba(255, 255, 255, .7);
        transition: color .5s
    }

    .nav-link:hover {
        color: #fff
    }

    .navbar.scrolled .nav-link {
        color: rgba(18, 31, 18, .6)
    }

    .navbar.scrolled .nav-link:hover {
        color: var(--brand-accent)
    }

    .nav-cta {
        padding: .75rem 1.5rem;
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .15em;
        border-radius: 9999px;
        background: #fff;
        color: var(--brand-primary);
        transition: all .5s
    }

    .nav-cta:hover {
        background: var(--brand-accent);
        color: #fff
    }

    .navbar.scrolled .nav-cta {
        background: var(--brand-primary);
        color: #fff
    }

    .navbar.scrolled .nav-cta:hover {
        background: var(--brand-accent)
    }

    .mobile-toggle {
        display: block;
        color: #fff;
        transition: color .5s
    }

    .navbar.scrolled .mobile-toggle {
        color: var(--brand-primary)
    }

    @media(min-width:768px) {
        .mobile-toggle {
            display: none
        }
    }

    .mobile-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--brand-bg);
        border-bottom: 1px solid rgba(18, 31, 18, .05);
        padding: 2rem;
        flex-direction: column;
        gap: 1.5rem
    }

    .mobile-menu.open {
        display: flex
    }

    @media(min-width:768px) {
        .mobile-menu {
            display: none !important
        }
    }

    .mobile-menu a {
        font-family: var(--font-serif);
        font-size: 1.25rem;
        color: var(--brand-primary)
    }

    .mobile-menu .mob-btn {
        padding: 1.25rem;
        font-family: var(--font-sans);
        text-align: center;
        font-weight: 700;
        font-size: .85rem;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: .5rem
    }

    /* Hero */
    .hero {
        position: relative;
        height: 100vh;
        width: 100%;
        overflow: hidden;
        display: flex;
        align-items: center
    }

    .hero-bg {
        position: absolute;
        inset: 0;
        transform: scale(1.1)
    }

    .hero-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover
    }

    .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0, 0, 0, .5), rgba(0, 0, 0, .3), var(--brand-bg))
    }

    .hero .stars {
        display: flex;
        gap: 2px;
        color: var(--brand-accent)
    }

    .hero .rating-row {
        display: flex;
        align-items: center;
        gap: .75rem;
        margin-bottom: 1.5rem
    }

    .hero .rating-text {
        color: rgba(255, 255, 255, .6);
        font-size: .875rem;
        font-weight: 700
    }

    .hero h1 {
        font-size: clamp(3rem, 8vw, 7rem);
        color: #fff;
        line-height: .9;
        margin-bottom: 2rem;
        font-weight: 500;
        text-wrap: balance
    }

    .hero h1 .accent {
        font-style: italic;
        font-weight: 300;
        color: rgba(184, 134, 11, .9)
    }

    .hero .sub {
        color: rgba(255, 255, 255, .65);
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        margin-bottom: 3rem;
        max-width: 42rem;
        line-height: 1.6;
        font-weight: 300
    }

    .hero-actions {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start
    }

    @media(min-width:640px) {
        .hero-actions {
            flex-direction: row;
            align-items: center
        }
    }

    .cta-primary {
        padding: 1.25rem 2.5rem;
        background: var(--brand-accent);
        color: #fff;
        font-weight: 700;
        font-size: .85rem;
        text-transform: uppercase;
        letter-spacing: .15em;
        border-radius: 9999px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, .25);
        display: inline-flex;
        align-items: center;
        gap: .75rem
    }

    .phone-cta {
        display: flex;
        align-items: center;
        gap: 1rem;
        color: #fff
    }

    .phone-circle {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, .2);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all .5s
    }

    .phone-cta:hover .phone-circle {
        background: var(--brand-accent);
        border-color: var(--brand-accent)
    }

    .phone-label {
        font-size: .625rem;
        text-transform: uppercase;
        letter-spacing: .2em;
        opacity: .5;
        margin-bottom: 2px
    }

    .phone-number {
        font-size: 1.5rem;
        font-family: var(--font-serif);
        font-style: italic
    }

    .scroll-indicator {
        position: absolute;
        bottom: 3rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, .3);
        animation: bounce 2s infinite
    }

    /* Section shared */
    .section-label {
        color: var(--brand-accent);
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .4em;
        margin-bottom: 1.5rem
    }

    .section-title {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        line-height: .9;
        margin-bottom: 2rem
    }

    .section-title .light {
        font-style: italic;
        font-weight: 300
    }

    .section-desc {
        font-size: 1.25rem;
        color: rgba(18, 31, 18, .5);
        line-height: 1.6
    }

    /* Trust Bar */
    .trust-bar {
        padding: 3rem 0;
        background: #fff;
        border-bottom: 1px solid rgba(18, 31, 18, .05)
    }

    .stat-value {
        font-size: clamp(2rem, 4vw, 3rem);
        font-family: var(--font-serif);
        font-weight: 700;
        color: var(--brand-primary);
        margin-bottom: .5rem
    }

    .stat-label {
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .2em;
        color: rgba(18, 31, 18, .4)
    }

    /* Cards */
    .card {
        padding: 2.5rem;
        border-radius: 2rem;
        background: #fff;
        border: 1px solid rgba(18, 31, 18, .05);
        transition: box-shadow .5s
    }

    .card:hover {
        box-shadow: 0 20px 60px rgba(0, 0, 0, .08)
    }

    .card-icon {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: rgba(184, 134, 11, .1);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
        transition: background .5s;
        color: var(--brand-accent)
    }

    .card:hover .card-icon {
        background: rgba(184, 134, 11, .2)
    }

    .card h3 {
        font-size: 1.5rem;
        font-style: italic;
        margin-bottom: 1rem
    }

    .card p {
        color: rgba(18, 31, 18, .5);
        line-height: 1.6
    }

    /* Process */
    .process-card {
        position: relative;
        padding: 2.5rem;
        border-radius: 2.5rem;
        border: 1px solid rgba(18, 31, 18, .05);
        transition: all .5s;
        background: rgba(252, 250, 247, .5)
    }

    .process-card:hover {
        border-color: rgba(184, 134, 11, .2)
    }

    .process-num {
        position: absolute;
        top: 1.5rem;
        right: 2rem;
        font-size: 5rem;
        font-family: var(--font-serif);
        font-weight: 700;
        color: rgba(18, 31, 18, .04)
    }

    .process-icon {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        background: rgba(184, 134, 11, .1);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 2rem;
        color: var(--brand-accent);
        transition: all .5s
    }

    .process-card:hover .process-icon {
        background: var(--brand-accent);
        color: #fff
    }

    /* Services */
    .service-item {
        margin-bottom: 1rem
    }

    .service-img-wrap {
        aspect-ratio: 3/2;
        overflow: hidden;
        border-radius: 2.5rem;
        margin-bottom: 2rem;
        position: relative;
        background: rgba(18, 31, 18, .05)
    }

    .service-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 1s
    }

    .service-item:hover .service-img-wrap img {
        transform: scale(1.1)
    }

    .service-img-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, .4), transparent);
        transition: background .5s
    }

    .service-item:hover .service-img-overlay {
        background: linear-gradient(to top, rgba(0, 0, 0, .2), transparent)
    }

    .service-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1.5rem
    }

    .service-header h3 {
        font-size: 1.875rem;
        font-style: italic;
        margin-bottom: .75rem
    }

    .service-header p {
        color: rgba(18, 31, 18, .5);
        line-height: 1.6;
        max-width: 28rem;
        margin-bottom: 1.25rem
    }

    .service-tags {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem
    }

    .tag {
        display: inline-flex;
        align-items: center;
        gap: .375rem;
        padding: .5rem 1rem;
        background: rgba(184, 134, 11, .1);
        color: var(--brand-accent);
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        border-radius: 9999px
    }

    .service-arrow {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        border: 1px solid rgba(18, 31, 18, .1);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: .25rem;
        transition: all .5s
    }

    .service-item:hover .service-arrow {
        background: var(--brand-primary);
        color: #fff
    }

    /* Special Offer */
    .offer {
        padding: 5rem 0;
        background: var(--brand-primary);
        color: #fff;
        position: relative;
        overflow: hidden
    }

    .offer-bg {
        position: absolute;
        inset: 0;
        opacity: .1
    }

    .offer-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover
    }

    .offer-inner {
        position: relative;
        z-index: 1;
        text-align: center
    }

    .offer h2 {
        font-size: clamp(2.5rem, 5vw, 4.5rem);
        line-height: .9;
        margin-bottom: 2rem
    }

    .offer h2 .light {
        font-style: italic;
        font-weight: 300
    }

    .offer h2 .gold {
        color: var(--brand-accent)
    }

    .offer .sub {
        font-size: 1.25rem;
        color: rgba(255, 255, 255, .5);
        max-width: 42rem;
        margin: 0 auto 2.5rem;
        line-height: 1.6
    }

    .offer-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem
    }

    @media(min-width:640px) {
        .offer-actions {
            flex-direction: row;
            justify-content: center
        }
    }

    .offer-phone {
        display: flex;
        align-items: center;
        gap: .75rem;
        color: rgba(255, 255, 255, .7);
        transition: color .3s
    }

    .offer-phone:hover {
        color: #fff
    }

    /* Testimonials */
    .testimonial {
        padding: 2.5rem;
        border-radius: 2.5rem;
        background: var(--brand-bg);
        border: 1px solid rgba(18, 31, 18, .05);
        transition: box-shadow .5s
    }

    .testimonial:hover {
        box-shadow: 0 20px 60px rgba(0, 0, 0, .08)
    }

    .testimonial .quote-icon {
        color: rgba(184, 134, 11, .2);
        margin-bottom: 1.5rem
    }

    .testimonial blockquote {
        font-size: 1.25rem;
        font-family: var(--font-serif);
        font-style: italic;
        line-height: 1.6;
        margin-bottom: 2rem
    }

    .testimonial-footer {
        display: flex;
        align-items: center;
        justify-content: space-between
    }

    .testimonial-author {
        display: flex;
        align-items: center;
        gap: 1rem
    }

    .author-avatar {
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        background: rgba(184, 134, 11, .1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--brand-accent);
        font-family: var(--font-serif);
        font-size: 1.25rem;
        font-weight: 700
    }

    .author-name {
        font-weight: 700;
        font-size: .875rem
    }

    .author-role {
        font-size: .625rem;
        text-transform: uppercase;
        letter-spacing: .15em;
        color: rgba(18, 31, 18, .4)
    }

    .project-tag {
        padding: .5rem 1rem;
        background: rgba(184, 134, 11, .1);
        color: var(--brand-accent);
        font-size: .625rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .08em;
        border-radius: 9999px
    }

    @media(max-width:639px) {
        .project-tag {
            display: none
        }
    }

    /* Testimonial Stars Row */
    .stars-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 1rem
    }

    .stars-row .stars {
        display: flex;
        gap: 2px;
        color: var(--brand-accent)
    }

    .stars-summary {
        color: rgba(18, 31, 18, .4);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .15em;
        font-size: .75rem
    }

    /* Service Area */
    .area-tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem
    }

    .area-tag {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        padding: .75rem 1.5rem;
        background: #fff;
        border: 1px solid rgba(18, 31, 18, .05);
        border-radius: 9999px;
        font-family: var(--font-serif);
        font-style: italic;
        font-size: 1.125rem;
        transition: border-color .3s
    }

    .area-tag:hover {
        border-color: rgba(184, 134, 11, .3)
    }

    .area-tag i[data-lucide] {
        color: var(--brand-accent)
    }

    /* FAQ */
    .faq-item {
        border-radius: 2rem;
        transition: all .5s;
        border: 1px solid rgba(18, 31, 18, .05)
    }

    .faq-item.open {
        background: var(--brand-bg);
        box-shadow: 0 20px 60px rgba(0, 0, 0, .08);
        border-color: transparent
    }

    .faq-btn {
        width: 100%;
        padding: 2rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
        gap: 1rem
    }

    .faq-btn span {
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        font-family: var(--font-serif);
        font-style: italic
    }

    .faq-chevron {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
